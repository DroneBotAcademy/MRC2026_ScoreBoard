<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control - DRONE MRC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,700;1,700&family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 bg-slate-950 text-white transition-colors duration-500">
    <div id="dashboardPage" class="max-w-[1600px] mx-auto h-full flex flex-col gap-4">
        <header class="glass-panel rounded-3xl p-4 flex items-center justify-between border-b-4 border-red-600 shadow-2xl">
            <div class="flex items-center gap-4">
                <button onclick="location.href='index.html'" class="p-2 hover:bg-white/5 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                </button>
                <h1 class="race-font text-2xl font-black italic uppercase">Race <span class="text-red-600">Control</span></h1>
            </div>
            
            <div class="flex flex-col items-center">
                <div id="timerDisplay" class="digital-font text-7xl font-black timer-glow">00:00:000</div>
                <div class="flex gap-4 mt-2">
                    <button onclick="startTimer()" class="btn-timer btn-timer-start">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 2.691l12 7.309-12 7.309V2.691z"/></svg>
                        START
                    </button>
                    <button onclick="stopTimer()" class="btn-timer btn-timer-stop">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                        STOP
                    </button>
                    <button onclick="resetTimer()" class="btn-timer btn-timer-reset">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        RESET
                    </button>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="toggleTheme()" class="btn-action btn-theme-effect theme-toggle-btn px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-full text-xs font-bold border border-white/5 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
                <button onclick="syncWithDatabase()" class="btn-action px-4 py-2 bg-red-600 hover:bg-red-500 rounded-full text-xs font-bold shadow-lg shadow-red-900/20">🔄 Sync Data</button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1">
            <section class="lg:col-span-4 glass-panel p-6 rounded-3xl border-t-4 border-red-600">
                <label class="text-[11px] font-bold opacity-60 uppercase mb-3 block italic">Select Competitor</label>
                <select id="teamId" onchange="switchTab(this.value)" class="w-full bg-slate-800 text-white rounded-2xl p-5 font-black text-xl outline-none border border-white/10 mb-8">
                    <option value="VIEW_ALL">🏆 LEADERBOARD</option>
                    <optgroup label="COMPETITORS" id="teamGroup"></optgroup>
                </select>

                <label class="text-[11px] font-bold opacity-60 uppercase mb-3 block italic text-red-500">Record Time</label>
                <div class="grid grid-cols-3 gap-3 bg-black/40 p-4 rounded-2xl mb-8">
                    <input type="number" id="inMin" placeholder="0" class="bg-transparent text-center text-5xl font-black digital-font outline-none">
                    <input type="number" id="inSec" placeholder="00" class="bg-transparent text-center text-5xl font-black digital-font outline-none border-x border-white/10">
                    <input type="number" id="inMs" placeholder="000" class="bg-transparent text-center text-5xl font-black digital-font outline-none">
                </div>
                <button onclick="addLap()" id="addBtn" class="btn-pop w-full bg-red-600 py-6 rounded-2xl font-black text-2xl uppercase italic shadow-xl">Save Record</button>
            </section>

            <section class="lg:col-span-8 glass-panel rounded-3xl overflow-hidden flex flex-col border-t-4 border-red-600">
                <div class="bg-black/10 px-10 py-6 flex justify-between items-end border-b border-white/5">
                    <div>
                        <div id="statusBadge" class="inline-block px-3 py-1 bg-red-600 text-[10px] font-black rounded mb-2 uppercase">Standby</div>
                        <h2 id="displayTeamName" class="font-black text-5xl italic uppercase leading-none">LEADERBOARD</h2>
                    </div>
                    <div id="displayRound" class="digital-font text-2xl font-black text-red-600">LIVE STATS</div>
                </div>
                <div class="flex-1 overflow-y-auto">
                    <table class="w-full">
                        <tbody id="scoreBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
